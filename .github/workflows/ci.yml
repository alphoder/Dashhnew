name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SOLANA_CLUSTER: devnet
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          SIWS_SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
        run: npm run build
